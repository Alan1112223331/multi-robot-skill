# 机械臂 + 机械狗群协同配置

robots:
  # MyCobot 机械臂
  mycobot_arm:
    type: custom
    adapter_class: adapters.mycobot_adapter.MyCobotAdapter
    endpoint: http://192.168.50.120:5000
    config:
      timeout: 30

  # 机械狗群 - 0号狗
  dog_0:
    type: custom
    adapter_class: adapters.dogfleet_adapter.DogFleetAdapter
    endpoint: http://localhost:8000
    config:
      timeout: 10
      dog_id: 0

  # 机械狗群 - 1号狗（可选）
  dog_1:
    type: custom
    adapter_class: adapters.dogfleet_adapter.DogFleetAdapter
    endpoint: http://localhost:8000
    config:
      timeout: 10
      dog_id: 1

# 错误处理配置
error_handling:
  max_retries: 3
  retry_delay: 1.0
  timeout: 60.0
  default_strategy: retry  # retry / skip / abort / rollback / continue
